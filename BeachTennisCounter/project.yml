name: BeachTennisCounter
options:
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  bundleIdPrefix: com.renan.beachtennis
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en
  knownRegions:
    - Base
    - en
    - pt-BR

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "4"

targets:
  BeachTennisCounterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.renan.beachtennis.tests
    dependencies:
      - target: BeachTennisCounter

  BeachTennisCounter:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: iOS
      - path: Shared
    info:
      path: iOS/Info.plist
      properties:
        CFBundleName: BeachTennisCounter
        CFBundleDisplayName: Beach Tennis Score
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: iOS/BeachTennisCounter.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.renan.beachtennis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.renan.beachtennis
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: iOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BeachTennisCounterWatch

  BeachTennisCounterWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: watchOS
      - path: Shared
    info:
      path: watchOS/Info.plist
      properties:
        CFBundleName: BeachTennisWatch
        CFBundleDisplayName: Beach Tennis Score
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKCompanionAppBundleIdentifier: com.renan.beachtennis
        WKApplication: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.renan.beachtennis.watchkitapp
        INFOPLIST_FILE: watchOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  BeachTennisCounter:
    build:
      targets:
        BeachTennisCounter: all
        BeachTennisCounterWatch: all
        BeachTennisCounterTests: [testing]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BeachTennisCounterTests
    archive:
      config: Release

  BeachTennisCounterWatch:
    build:
      targets:
        BeachTennisCounterWatch: all
    run:
      config: Debug
