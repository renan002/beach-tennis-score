name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # App-file paths that gate the expensive build/test steps below.
      # Hand-maintained: add a new top-level app directory here (see ADR-0002).
      - name: Check for app changes
        id: check
        run: |
          changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          app_changed=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              BeachTennisCounter/*|.github/workflows/ci.yml)
                app_changed=true
                break
                ;;
            esac
          done <<< "$changed"
          echo "Changed files:"
          echo "$changed"
          echo "app_changed=$app_changed" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        if: steps.check.outputs.app_changed == 'true'
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"

      - name: Show toolchain
        if: steps.check.outputs.app_changed == 'true'
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -i iphone | head -5

      - name: Build watchOS target
        if: steps.check.outputs.app_changed == 'true'
        working-directory: BeachTennisCounter
        run: |
          xcodebuild -target BeachTennisCounterWatch -sdk watchsimulator build \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        if: steps.check.outputs.app_changed == 'true'
        working-directory: BeachTennisCounter
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          xcodebuild test -project BeachTennisCounter.xcodeproj \
            -scheme BeachTennisCounter \
            -destination "platform=iOS Simulator,name=${DEVICE}" \
            CODE_SIGNING_ALLOWED=NO
