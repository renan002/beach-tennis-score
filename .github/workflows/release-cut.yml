name: Release Cut

# Cuts a release branch from develop, bumps the version, and opens a PR into
# main. Uses a PAT (RELEASE_PAT secret) instead of the default GITHUB_TOKEN
# so the created PR actually triggers ci.yml's pull_request run — see
# docs/adr/0001-release-cut-automation.md.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to cut (x.y.z, no 'v' prefix)"
        required: true
        type: string

jobs:
  cut:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ secrets.RELEASE_PAT }}
    steps:
      - name: Checkout develop
        uses: actions/checkout@v7
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Validate version
        run: scripts/validate-release-version.sh "$VERSION" BeachTennisCounter/project.yml

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: git checkout -b "release/$VERSION"

      - name: Bump version in project.yml and project.pbxproj
        id: bump
        run: |
          set -euo pipefail
          YML=BeachTennisCounter/project.yml
          PBX=BeachTennisCounter/BeachTennisCounter.xcodeproj/project.pbxproj
          CURRENT_BUILD=$(grep -E '^\s*CURRENT_PROJECT_VERSION:' "$YML" | head -1 | sed -E 's/^[^"]*"([^"]*)".*/\1/')
          NEW_BUILD=$((CURRENT_BUILD + 1))
          # project.yml is the source of truth.
          sed -i -E "s/(MARKETING_VERSION: )\"[^\"]*\"/\1\"$VERSION\"/" "$YML"
          sed -i -E "s/(CURRENT_PROJECT_VERSION: )\"[^\"]*\"/\1\"$NEW_BUILD\"/" "$YML"
          # Keep the checked-in Xcode project in sync WITHOUT running xcodegen
          # (which needs macOS + would reserialize the whole project). These two
          # keys are what actually reach the built binary's build settings, so
          # they must match project.yml — otherwise an app archived from main
          # ships the old version. See ADR-0001. Every build config carries the
          # value, so both occurrences are patched. perl (not sed) because the
          # pbxproj value is unquoted (MARKETING_VERSION = 1.2.0;), so a sed \1
          # backref would run into the replacement digits; ${1} is unambiguous.
          perl -i -pe "s/(MARKETING_VERSION = )[^;]+;/\${1}$VERSION;/" "$PBX"
          perl -i -pe "s/(CURRENT_PROJECT_VERSION = )[^;]+;/\${1}$NEW_BUILD;/" "$PBX"
          # Fail loudly if the two files disagree — a structural pbxproj change
          # could have moved these keys out from under the patch above.
          if ! grep -q "MARKETING_VERSION = $VERSION;" "$PBX" \
             || ! grep -q "CURRENT_PROJECT_VERSION = $NEW_BUILD;" "$PBX"; then
            echo "error: project.pbxproj was not patched to $VERSION ($NEW_BUILD); regenerate it with xcodegen and retry" >&2
            exit 1
          fi
          echo "new_build=$NEW_BUILD" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add BeachTennisCounter/project.yml \
                  BeachTennisCounter/BeachTennisCounter.xcodeproj/project.pbxproj
          git commit -m "chore(release): bump version to $VERSION (build ${{ steps.bump.outputs.new_build }})"

      - name: Push release branch
        run: git push origin "release/$VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          set -euo pipefail
          LAST_TAG=$(git describe --tags --abbrev=0 develop 2>/dev/null || echo "")
          {
            echo "changelog<<CHANGELOG_EOF"
            if [[ -n "$LAST_TAG" ]]; then
              git log "$LAST_TAG"..develop --pretty=format:'- %s (%h)'
            else
              git log develop --pretty=format:'- %s (%h)'
            fi
            echo
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open release PR
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "release/$VERSION" \
            --title "Release $VERSION" \
            --body "## Release $VERSION

          Auto-generated by the release-cut workflow.

          > [!IMPORTANT]
          > Merge this PR with a **merge commit** (\`gh pr merge --merge\`), never
          > squash or rebase. Squashing collapses \`release/$VERSION\` into a single
          > commit and severs the ancestry link back to \`develop\`, which makes the
          > follow-up \`main → develop\` merge-back PR diff against the wrong common
          > ancestor and surface spurious conflicts. See ADR-0001.

          ### Changes since last release
          $CHANGELOG"
